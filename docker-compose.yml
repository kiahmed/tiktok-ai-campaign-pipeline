services:
  app:
    build: .
    container_name: tiktok-ad-automator
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # Persist generated videos, logs and the SQLite DB on the host.
      - ./generated_videos:/app/generated_videos
      - ./logs:/app/logs
      - ./app.db:/app/app.db
    restart: unless-stopped
    # To use Postgres instead of SQLite, uncomment `depends_on` and set
    # DATABASE_URL=postgresql+psycopg2://tiktok:tiktok@db:5432/tiktok_ads in .env
    # depends_on:
    #   db:
    #     condition: service_healthy

  # ---- Optional PostgreSQL service (upgrade path from SQLite) ----
